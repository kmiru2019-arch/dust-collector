name: 로또 당첨번호 주간 자동 업데이트

# 매주 토요일 추첨(KST 20:35~) 이후 자동 실행.
# cron은 UTC 기준 — 일요일 00:10 UTC = 일요일 09:10 KST (추첨 다음날 오전, 결과 확정 후 충분).
on:
  schedule:
    - cron: "10 0 * * 0"
  workflow_dispatch: {} # 수동 실행도 허용

# 워크플로가 저장소에 커밋(push)할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 신규 회차 조회·반영
        run: node scripts/update-history.mjs

      - name: 변경 시 커밋·푸시
        run: |
          if [[ -n "$(git status --porcelain lib/lottery/lotto-history.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add lib/lottery/lotto-history.json
            git commit -m "chore(lottery): 로또 당첨번호 자동 업데이트"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi
